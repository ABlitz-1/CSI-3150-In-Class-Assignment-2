<html>
  <head>
    <link rel="stylesheet" href="css/main.css" />
    <script src="js/main.js"></script>
  </head>
  <body>
    <div class="header">
      <h2>Welcome to the Interactive Reveal What's that Animal UI</h2>
    </div>
    <div class="header">
      <h2>Click on the buttons below to reveal the animal images</h2>
    </div>
    <div class="row">
      <div class="cat">
        <img src="tabby-cat.jpg" alt="cat">
        <button>Hide Result</button>
      </div>
      <div class="dog">
        <img src="dog.jpg" alt="dog">
        <button>Hide Result</button>
      </div>
      <div class="cow">
        <img src="cow.jpg" alt="cow">
        <button>Hide Result</button>
      </div>
      
    </div>
    <div class="buttons">
      <button class="catb">Reveal a CAT</button>
      <button class="dogb">Reveal a DOG</button>
      <button class="cowb">Reveal a COW</button>
    </div>
      

  </body>
</html>
